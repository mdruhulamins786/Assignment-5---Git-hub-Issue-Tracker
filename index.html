<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Assignment 5 - Github Issue Tracker</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }

      body {
        font-family: "Poppins", sans-serif;
      }
    </style>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
      <!-- Logo + Title -->
      <div class="flex flex-col items-center gap-6 mb-10">
        <img
          class="w-24 h-24"
          src="./assets/github-logo.png"
          alt="GitHub Logo"
        />

        <div>
          <h2 class="text-2xl font-semibold text-center">
            GitHub Issues Tracker
          </h2>
          <p class="text-gray-600 text-sm text-center">
            Sign in to manage your issues
          </p>
        </div>
      </div>

      <!-- Login Form -->
      <form class="space-y-4">
        <!-- Username -->
        <div>
          <label
            for="username"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Username
          </label>
          <input
            id="username"
            name="username"
            type="text"
            value="admin"
            placeholder="Enter your username"
            autocomplete="username"
            required
            class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <!-- Password -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            value="admin123"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 mt-2 rounded-md hover:bg-blue-700 transition font-medium"
        >
          Login
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-6 text-center">
        <p class="text-gray-600 text-sm mb-6">Demo Credentials:</p>
        <p class="font-bold">
          Username: <span class="font-normal">admin</span>
        </p>
        <p class="font-bold">
          Password: <span class="font-normal">admin123</span>
        </p>
      </div>
    </div>

    <!-- JS -->
    <script src="./app.js"></script>
  </body>
</html>
