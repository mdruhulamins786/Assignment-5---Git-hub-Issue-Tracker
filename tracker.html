<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Assignment 5 - Github Issue Tracker</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }

      body {
        font-family: "Poppins", sans-serif;
      }
    </style>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>

  <body>
    <div class="max-w-[77.5rem] sm:mx-5 mx-6 lg:mx-auto my-5">
      <!-- Header -->
      <div
        class="navbar flex gap-3 flex-col items-start justify-between md:flex-row bg-base-100 shadow-sm mb-8"
      >
        <div class="">
          <a class="btn btn-ghost text-xl">
            <img
              src="./assets/github-logo.png"
              alt="GitHub Logo"
              class="w-6 h-6 mr-2"
            />
            <span>GitHub Issues Tracker</span>
          </a>
        </div>
        <div class="flex gap-2">
          <input
            id="search-input"
            type="text"
            placeholder="Search"
            class="input input-bordered"
          />
          <div>
            <button class="btn btn-ghost btn-circle">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- filter items -->
      <div id="filter-items" class="flex flex-wrap gap-4 mb-6 shadow-md p-4">
        <button
          id="all"
          class="btn btn-sm bg-primary/30 text-primary rounded-full border-primary"
        >
          All
        </button>
        <button
          id="open"
          class="btn btn-sm bg-green-200 text-green-700 rounded-full border-green-300"
        >
          Open
        </button>
        <button
          id="closed"
          class="btn btn-sm bg-red-200 text-red-700 rounded-full border-red-300"
        >
          Closed
        </button>
      </div>

      <!-- count items -->
      <div class="shadow-md p-4 mb-6">
        <div>
          <div class="flex items-center gap-4">
            <img src="./assets/Aperture.png" alt="" />
            <div>
              <h5 class="font-semibold text-lg">
                <span id="issue-count">0</span> Issues
              </h5>
              <p class="text-gray-400 font-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div
        id="tracker-items"
        class="max-w-[1140px] sm:mx-6 lg:mx-auto grid sm:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </div>

    <!-- js Content -->
    <script src="./tracker.js"></script>
  </body>
</html>
