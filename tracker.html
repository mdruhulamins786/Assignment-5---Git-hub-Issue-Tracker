<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Assignment 5 - Github Issue Tracker</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }

      body {
        font-family: "Poppins", sans-serif;
      }
    </style>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>

  <body>
    <div class="max-w-[77.5rem] sm:mx-5 lg:mx-auto">
      <!-- Header -->
      <div class="navbar bg-base-100 shadow-sm mb-8">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <img
              src="./assets/github-logo.png"
              alt="GitHub Logo"
              class="w-6 h-6 mr-2"
            />
            <span>GitHub Issues Tracker</span>
          </a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <div>
            <button class="btn btn-ghost btn-circle">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div
        id="tracker-items"
        class="max-w-[1140px] sm:mx-6 lg:mx-auto grid sm:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- 1 -->

        <div class="p-4 shadow-md rounded-md border-t-3 border-error">
          <div class="flex py-3 flex-wrap items-center justify-between">
            <img
              class="w-10 h-10 cursor-pointer"
              src="./assets/Open-Status.png"
              alt="Aperture Logo"
            />
            <button
              class="btn btn-sm bg-error/30 text-error rounded-full border border-error"
            >
              High
            </button>
          </div>

          <h3 class="text-2xl font-semibold">
            Fix navigation menu on mobile devices
          </h3>
          <p class="text-gray-400 mt-2 mb-4">
            The navigation menu doesn't collapse properly on mobile devices...
          </p>
          <div>
            <span
              class="badge bg-error/30 text-error rounded-full border border-error"
              >bug</span
            >
            <span
              class="badge bg-warning/30 text-warning rounded-full border border-warning"
              >high priority</span
            >
          </div>
          <hr class="my-4 text-gray-300" />
          <div class="flex flex-wrap flex-col gap-2 text-gray-400">
            <p>#1by john_doe</p>
            <p>1/1/2023</p>
          </div>
        </div>
      </div>
    </div>

    <!-- js Content -->
    <script src="./tracker.js"></script>
  </body>
</html>
